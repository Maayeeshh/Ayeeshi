<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Page</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    font-family:Arial,sans-serif;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

input{
    width:90%;
    padding:12px;
    margin:15px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
}

p{
    color:red;
}
</style>

</head>
<body>

<div class="box">
<h2>🔒 Enter Password</h2>

<input type="password" id="pass" placeholder="Password">

<button onclick="checkPassword()">Submit</button>

<p id="msg"></p>

</div>

<script>

function checkPassword(){

let password="maayeesha";

let input=document.getElementById("pass").value;

if(input===password){
window.location.href="home.html";
}else{
document.getElementById("msg").innerHTML="Incorrect Password!";
}

}

</script>

</body>
</html>
